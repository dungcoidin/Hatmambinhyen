<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Anonymous Mailbox Application</title>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
    <header class="bg-blue-600 w-full p-4 text-white text-center">
        <h1 class="text-2xl font-bold">Anonymous Mailbox</h1>
    </header>
    <main class="flex flex-col items-center justify-center flex-1 w-full p-4">
        <form class="bg-white shadow-md rounded px-8 py-6 mb-4 w-full max-w-lg">
            <h2 class="text-lg font-semibold mb-4">Send a Message</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="message">
                    Message
                </label>
                <textarea id="message" rows="4" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
            </div>
            <div class="flex items-center justify-between">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                    Send
                </button>
            </div>
        </form>
        <div class="text-gray-600 text-sm">
            <p>Anonymous messages can be sent securely.</p>
        </div>
    </main>
    <footer class="bg-blue-600 w-full p-4 text-white text-center">
        <p>&copy; 2026 Anonymous Mailbox</p>
    </footer>
</body>
</html>
